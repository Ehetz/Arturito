services:
  db:
    image: postgres:16
    container_name: mitarbeiter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mitarbeiter
      POSTGRES_USER: mitarbeiter_user
      POSTGRES_PASSWORD: mitarbeiter_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  pgdata:
