<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Pipeline</h1>
      <button id="refreshBtn">Refresh</button>
    </header>

    <main>
      <aside>
        <h2>Projects</h2>
        <form id="createProjectForm" class="panel">
          <h3>Create project</h3>
          <input name="name" placeholder="Project name" required />
          <textarea name="description" placeholder="Description"></textarea>
          <label>
            Importance
            <select name="importance">
              <option value="1">1 (very important)</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>
          <button type="submit">Add project</button>
        </form>
        <form id="filterForm" class="panel">
          <h3>Filters</h3>
          <label>
            Status
            <select name="status">
              <option value="">all</option>
              <option value="active">active</option>
              <option value="paused">paused</option>
              <option value="blocked">blocked</option>
              <option value="completed">completed</option>
              <option value="maintenance">maintenance</option>
            </select>
          </label>
          <label>
            Importance ≤
            <select name="importanceMax">
              <option value="">any</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>
          <label><input type="checkbox" name="criticalOnly" /> Critical only</label>
        </form>
        <ul id="projectList"></ul>
      </aside>

      <section>
        <h2>Details</h2>
        <form id="addStepForm" class="panel" style="display:none;">
          <h3>Add step</h3>
          <input name="title" placeholder="Step title" required />
          <textarea name="description" placeholder="Step description"></textarea>
          <button type="submit">Add step</button>
        </form>
        <div id="details">Select a project.</div>
        <form id="quickActionForm" class="panel" style="display:none; margin-top:12px;">
          <h3>Quick actions</h3>
          <label><input type="checkbox" name="critical" /> Mark as critical</label>
          <label>
            Set project status
            <select name="status">
              <option value="">(no change)</option>
              <option value="active">active</option>
              <option value="paused">paused</option>
              <option value="blocked">blocked</option>
              <option value="completed">completed</option>
              <option value="maintenance">maintenance</option>
            </select>
          </label>
          <label>
            Set current step
            <select name="currentStep">
              <option value="">(no change)</option>
            </select>
          </label>
          <button type="submit">Apply actions</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
